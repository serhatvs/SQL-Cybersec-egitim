services:
  db:
    image: postgres:16
    container_name: securebank_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securebank123
      POSTGRES_DB: securebank
    ports:
      - "5432:5432"
    volumes:
      - securebank_pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro

  adminer:
    image: adminer
    container_name: securebank_adminer
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"

volumes:
  securebank_pgdata:
